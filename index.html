<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Container principal da tela de login. -->
    <main class="login-page">
        <!-- Elemento decorativo de fundo; fica escondido de leitores de tela. -->
        <div class="background-loader" aria-hidden="true">
            <span></span>
        </div>
        <!-- Card com o conteudo principal do formulario de login. -->
        <section class="login-card">
            <h1>Entrar</h1>
            <!-- Formulario com os campos necessarios para autenticar o usuario. -->
            <form>
                <!-- Labels e inputs trabalham juntos: o label identifica o campo e o input coleta o dado. -->
                 <div class="input-group">
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="" required>
                    <label for="email">Email:</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="" required>
                    <label for="password">Senha:</label>
                </div>
                <button type="submit">Acessar</button> 
            </form>
        </section>
    </main>
</body>
</html>
